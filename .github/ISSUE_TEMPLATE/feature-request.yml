name: Feature Request
description: Suggest something more for DeePTB to do
labels: [Feature]
assignees: zhanghao

body:
- type: textarea
  attributes:
    label: Background
    description: |
      A clear and concise description of why this new feature is important.
  validations:
    required: true

- type: dropdown
  attributes:
    label: Affected area
    description: Pick the area that would most likely need implementation or review.
    options:
      - Model / Hamiltonian
      - Data / AtomicData
      - Config schema
      - CLI / workflow
      - Training / loss
      - Postprocess / export
      - Plugin / integration
      - Documentation / examples
      - Other

- type: textarea
  attributes:
    label: Describe the solution you'd like
    description: |
      A clear and concise description of what you want to happen.
  validations:
    required: true

- type: textarea
  attributes:
    label: Compatibility expectations
    description: |
      Describe whether this should preserve existing API, CLI, config, checkpoint, dataset, or output-format behavior.

- type: textarea
  attributes:
    label: Test or example expectations
    description: |
      Describe the expected smoke/regression/slow tests or runnable examples that should cover this feature.

- type: textarea
  attributes:
    label: Additional Context
    description: |
      Add any other context or screenshots about the feature request here.

- type: markdown
  attributes:
    value: >
      Thanks for contributing 🎉!
